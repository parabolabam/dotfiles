[metadata]
name = "tmux-windows"
description = "List and switch between tmux windows"
requirements = ["tmux"]

[source]
command = "~/.config/tmux/scripts/tv-list-windows"
display = "{split:\t:0} - {split:\t:1} ({split:\t:2})"
output = "{split:\t:0}"
ansi = true

[preview]
command = "tmux capture-pane -e -J -p -S -120 -t '{split:\t:0}' 2>/dev/null || echo 'No preview available'"

[ui]
preview_panel = { size = 70 }

[actions.select]
description = "Switch to the selected window"
command = "tmux switch-client -t '{split:\t:0}'"
mode = "execute"

[actions.kill]
description = "Kill the selected window"
command = "tmux kill-window -t '{split:\t:0}'"
mode = "fork"
